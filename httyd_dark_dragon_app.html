
<style>
@import url('https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=MedievalSharp&family=IM+Fell+English:ital@0;1&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
.app{background:#070a0f;min-height:620px;border-radius:14px;overflow:hidden;position:relative;color:#c8b89a;font-family:'IM Fell English',Georgia,serif}
.screen{display:none;position:relative;z-index:2;animation:rise .45s ease}
.screen.on{display:block}
@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.scanlines{position:absolute;inset:0;pointer-events:none;z-index:1;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.18) 3px,rgba(0,0,0,.18) 4px)}
.vignette{position:absolute;inset:0;pointer-events:none;z-index:1;background:radial-gradient(ellipse at center,transparent 55%,#000 100%)}

.home-wrap{padding:28px 20px 32px}
.rune-title{font-family:'Uncial Antiqua',serif;font-size:28px;color:#c8622a;text-align:center;letter-spacing:3px;margin-bottom:4px;text-shadow:0 0 30px rgba(200,80,20,.6)}
.rune-sub{text-align:center;font-style:italic;color:#6b5a40;font-size:15px;margin-bottom:26px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.dcard{background:#0d1117;border:1px solid #1e2530;border-radius:8px;cursor:pointer;overflow:hidden;transition:border-color .2s,transform .2s;position:relative}
.dcard:hover{border-color:#c8622a;transform:translateY(-3px)}
.dcard:hover .card-glow{opacity:1}
.card-glow{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .3s}
.card-svg-wrap{height:130px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#060810}
.card-svg-wrap svg{width:100%;height:100%}
.card-info{padding:10px 10px 12px}
.card-name{font-family:'Uncial Antiqua',serif;font-size:12px;color:#c8a060;letter-spacing:.5px;margin-bottom:2px}
.card-class{font-size:11px;color:#4a3d28;font-style:italic}

.prof-wrap{padding:24px 22px 28px}
.back{background:none;border:1px solid #1e2530;color:#6b5a40;padding:7px 14px;border-radius:6px;cursor:pointer;font-family:'IM Fell English',serif;font-size:13px;margin-bottom:20px;transition:all .2s}
.back:hover{border-color:#c8622a;color:#c8a060}
.prof-hero{display:flex;gap:20px;margin-bottom:20px;align-items:flex-start}
.prof-art{width:220px;flex-shrink:0;height:180px;background:#060810;border-radius:8px;border:1px solid #1e2530;overflow:hidden}
.prof-art svg{width:100%;height:100%}
.prof-meta{flex:1}
.prof-name{font-family:'Uncial Antiqua',serif;font-size:20px;color:#c8622a;margin-bottom:2px;line-height:1.2}
.prof-rider{font-size:13px;color:#6b5a40;font-style:italic;margin-bottom:14px}
.stat-row{margin-bottom:7px}
.stat-label{font-size:11px;color:#4a3d28;margin-bottom:3px;letter-spacing:.5px;font-family:'Uncial Antiqua',serif}
.stat-track{height:5px;background:#0d1117;border-radius:2px;border:1px solid #1e2530;overflow:hidden}
.stat-fill{height:100%;border-radius:2px;transition:width 1s ease}
.section-head{font-family:'Uncial Antiqua',serif;font-size:11px;color:#4a3d28;letter-spacing:2px;margin-bottom:10px;border-bottom:1px solid #1a1f28;padding-bottom:6px}
.ability{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
.aicon{width:28px;height:28px;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.aicon svg{width:16px;height:16px}
.atext{font-size:13px;line-height:1.5;color:#9a8870}
.atext strong{color:#c8a060;font-style:normal}
.weakness{background:#0d0810;border:1px solid #2a1218;border-radius:6px;padding:10px 14px;font-size:13px;color:#7a4040;font-style:italic;margin-bottom:18px}
.battle-btn{width:100%;background:#0d0a00;border:1px solid #6a3010;color:#c8622a;padding:13px;border-radius:7px;cursor:pointer;font-family:'Uncial Antiqua',serif;font-size:14px;letter-spacing:1px;transition:all .2s}
.battle-btn:hover{background:#180e00;border-color:#c8622a;box-shadow:0 0 20px rgba(200,80,20,.2)}

.sc-wrap{padding:24px 22px 28px}
.scenario-box{background:#060810;border:1px solid #1a2030;border-radius:8px;padding:20px;margin-bottom:18px;font-size:16px;line-height:1.8;color:#8a9ab8;font-style:italic;text-align:center;position:relative}
.scenario-box::before{content:'';position:absolute;inset:0;border-radius:8px;pointer-events:none}
.rune-line{text-align:center;font-family:'Uncial Antiqua',serif;font-size:11px;letter-spacing:3px;color:#2a2010;margin-bottom:12px}
.outcome-box{background:#060c08;border:1px solid #1a2818;border-radius:8px;padding:18px;margin-bottom:20px}
.outcome-head{font-family:'Uncial Antiqua',serif;font-size:11px;color:#3a5a28;letter-spacing:2px;margin-bottom:10px}
.outcome-text{font-size:15px;line-height:1.7;color:#7a9870}
.stars-row{display:flex;gap:4px;justify-content:center;margin-bottom:16px}
.star{width:18px;height:18px}
.btn-row{display:flex;gap:10px}
.btn2{flex:1;background:#060810;border:1px solid #1e2530;color:#6b5a40;padding:11px;border-radius:7px;cursor:pointer;font-family:'IM Fell English',serif;font-size:14px;transition:all .2s;text-align:center}
.btn2:hover{border-color:#c8622a;color:#c8a060}
</style>

<div class="app">
<div class="scanlines"></div>
<div class="vignette"></div>

<div class="screen on" id="s-home">
<div class="home-wrap">
<div class="rune-title">DRAGON RIDERS</div>
<div class="rune-sub">Choose your dragon, Viking. Choose wisely.</div>
<div class="grid" id="card-grid"></div>
</div>
</div>

<div class="screen" id="s-prof">
<div class="prof-wrap">
<button class="back" onclick="show('s-home')">&#8592; All Dragons</button>
<div class="prof-hero">
<div class="prof-art" id="prof-art"></div>
<div class="prof-meta">
<div class="prof-name" id="prof-name"></div>
<div class="prof-rider" id="prof-rider"></div>
<div id="prof-stats"></div>
</div>
</div>
<div class="section-head">SPECIAL ABILITIES</div>
<div id="prof-abilities"></div>
<div class="weakness" id="prof-weakness"></div>
<button class="battle-btn" onclick="goScenario()">&#9760; Send Into Battle &#9760;</button>
</div>
</div>

<div class="screen" id="s-sc">
<div class="sc-wrap">
<button class="back" onclick="show('s-prof')">&#8592; Back</button>
<div class="scenario-box" id="sc-text"></div>
<div class="rune-line" id="rune-line">&#10022; &#10022; &#10022;</div>
<div class="stars-row" id="stars-row"></div>
<div class="outcome-box">
<div class="outcome-head">WHAT HAPPENED</div>
<div class="outcome-text" id="outcome-text"></div>
</div>
<div class="btn-row">
<button class="btn2" onclick="goScenario()">&#8635; New Adventure</button>
<button class="btn2" onclick="show('s-home')">&#8962; Home</button>
</div>
</div>
</div>
</div>

let cur = null;

function show(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
document.getElementById(id).classList.add('on');
}

function buildGrid(){
const g = document.getElementById('card-grid');
g.innerHTML = dragons.map(d=>`
<div class="dcard" onclick="selectDragon('${d.id}')">
<div class="card-glow" style="background:radial-gradient(ellipse at 50% 30%,${glows[d.id]},transparent 70%)"></div>
<div class="card-svg-wrap">${SVG[d.id]}</div>
<div class="card-info">
<div class="card-name">${d.name}</div>
<div class="card-class">${d.class}</div>
</div>
</div>`).join('');
}

function selectDragon(id){
cur = dragons.find(d=>d.id===id);
document.getElementById('prof-art').innerHTML = SVG[id];
document.getElementById('prof-art').style.borderColor = glows[id].replace('0.15','0.5').replace('0.18','0.5').replace('0.12','0.4');
document.getElementById('prof-name').textContent = cur.name;
document.getElementById('prof-rider').textContent = cur.rider;
const sk = Object.keys(cur.stats);
document.getElementById('prof-stats').innerHTML = sk.map((k,i)=>`
<div class="stat-row">
<div class="stat-label">${k}</div>
<div class="stat-track"><div class="stat-fill" style="width:${cur.stats[k]*10}%;background:${cur.statColors[i]}"></div></div>
</div>`).join('');
document.getElementById('prof-abilities').innerHTML = cur.abilities.map(a=>`
<div class="ability">
<div class="aicon" style="background:${a.col}">
<svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><polygon points="8,1 10,6 15,6 11,10 13,15 8,12 3,15 5,10 1,6 6,6" fill="#c8a060" opacity=".7"/></svg>
</div>
<div class="atext"><strong>${a.label}:</strong> ${a.desc}</div>
</div>`).join('');
document.getElementById('prof-weakness').textContent = 'Weakness — ' + cur.weakness;
show('s-prof');
}

function goScenario(){
const sc = cur.scenarios[Math.floor(Math.random()*cur.scenarios.length)];
const out = sc.outcomes[Math.floor(Math.random()*sc.outcomes.length)];
const stars = Math.floor(Math.random()*2)+4;
document.getElementById('sc-text').textContent = sc.scene;
const runeChars = ['ᚠ','ᚢ','ᚦ','ᚨ','ᚱ','ᚲ','ᚷ','ᚹ','ᚺ','ᚾ','ᛁ','ᛃ','ᛇ','ᛈ','ᛉ','ᛊ','ᛏ','ᛒ','ᛖ','ᛗ','ᛚ','ᛜ','ᛞ','ᛟ'];
document.getElementById('rune-line').textContent = Array.from({length:7},()=>runeChars[Math.floor(Math.random()*runeChars.length)]).join(' ');
const starSVG = n => `<svg class="star" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><polygon points="9,1 11,6.5 17,6.5 12,10.5 14,16 9,12.5 4,16 6,10.5 1,6.5 7,6.5" fill="${n?'#c8820a':'#1a1a1a'}" stroke="${n?'#a06008':'#2a2a2a'}" stroke-width=".5"/></svg>`;
document.getElementById('stars-row').innerHTML = Array.from({length:5},(_,i)=>starSVG(i<stars)).join('');
document.getElementById('outcome-text').textContent = out;
show('s-sc');
}

buildGrid();
</script>
