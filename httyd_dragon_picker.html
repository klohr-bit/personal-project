
<style>

    margin-bottom: 6px;

    color: #d4a96a;
    font-style: italic;

    border-radius: 12px;
    padding: 16px 12px 18px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .dragon-card::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 0%, rgba(240,160,30,0.12), transparent 70%);
    pointer-events: none;
  }

  .dragon-card:hover {
    border-color: rgba(240,160,30,0.8);

    box-shadow: 0 8px 24px rgba(240,100,0,0.25);

  }

  .back-btn {
    background: rgba(80,40,0,0.6);

    color: #d4a96a;
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Crimson Text', serif;
    font-size: 15px;

  .scenario-btn {

    background: rgba(20,10,0,0.8);

    padding: 20px;
    margin-bottom: 20px;
    font-size: 17px;
    line-height: 1.7;
    color: #e0c898;
    font-style: italic;
    text-align: center;

    border: 1px solid rgba(80,180,40,0.4);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 22px;
    font-size: 16px;
    line-height: 1.6;
    color: #b8e090;

    font-family: 'Cinzel', serif;
    font-size: 14px;
    color: #90e040;
    margin-bottom: 10px;
    letter-spacing: 1px;

  .btn-row { display: flex; gap: 12px; flex-wrap: wrap; }

  .replay-btn {

    margin-bottom: 8px;

<div class="app">
  <div class="stars"></div>

  <!-- SCREEN 1: Home -->
  <div class="screen active" id="screen-home">
    <h1>🐉 Dragon Rider</h1>
    <p class="subtitle">Choose your dragon, brave Viking!</p>
    <div class="dragon-grid" id="dragon-grid"></div>
  </div>

  <!-- SCREEN 2: Dragon Profile -->
  <div class="screen" id="screen-profile">
    <button class="home-btn" onclick="goHome()">⬅ Back to all dragons</button>
    <div class="dragon-hero">
      <span class="dragon-hero-emoji" id="prof-emoji"></span>
      <div class="dragon-title" id="prof-name"></div>
      <div class="dragon-subtitle" id="prof-class"></div>
    </div>

    <div style="margin-bottom:12px;">
      <div id="prof-bars"></div>
    </div>

    <div class="abilities-box">
      <div class="abilities-title">⚡ SPECIAL ABILITIES</div>
      <div id="prof-abilities"></div>
    </div>
    <div class="weakness-box" id="prof-weakness"></div>
    <button class="scenario-btn" onclick="goScenario()">Send into Battle</button>
  </div>

  <!-- SCREEN 3: Scenario + Outcome -->
  <div class="screen" id="screen-scenario">
    <button class="back-btn" onclick="goProfile()">⬅ Back</button>
    <div class="scenario-box" id="scenario-text"></div>
    <div class="stars-display" id="stars-display"></div>
    <div class="outcome-box">
      <div class="outcome-title">🏆 WHAT HAPPENED</div>
      <div id="outcome-text"></div>
    </div>
    <div class="btn-row">
      <button class="replay-btn" onclick="goScenario()">🎲 New Adventure</button>
      <button class="replay-btn" onclick="goHome()" style="border-color:rgba(240,160,30,0.4);color:#d4a96a;">🏠 Home</button>
    </div>
  </div>
</div>

  showScreen('screen-home');
}

function goProfile() {
  showScreen('screen-profile');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function pickDragon(dragon) {
  selectedDragon = dragon;
  currentScenarioIndex = Math.floor(Math.random() * dragon.scenarios.length);

  document.getElementById('prof-emoji').textContent = dragon.dragonEmoji;
  document.getElementById('prof-name').textContent = dragon.name + (dragon.realName ? ' — ' + dragon.realName : '');
  document.getElementById('prof-class').textContent = dragon.class;

  const barsEl = document.getElementById('prof-bars');
  const statLabels = { speed: 'Speed', fire: dragon.id === 'scauldron' ? 'Water Blast' : 'Fire Power', strength: 'Strength', stealth: 'Stealth' };
  const statColors = { speed: '#60a8f0', fire: '#f06030', strength: '#d0a030', stealth: '#60c080' };
  barsEl.innerHTML = Object.entries(dragon.stats).map(([k, v]) => `
    <div class="power-bar-wrap">
      <div class="power-label"><span>${statLabels[k]}</span><span>${v}/10</span></div>
      <div class="power-bar"><div class="power-fill" style="width:${v*10}%;background:${statColors[k]};"></div></div>
    </div>
  `).join('');

  const abEl = document.getElementById('prof-abilities');
  abEl.innerHTML = dragon.abilities.map(a => `
    <div class="ability-row">
      <span class="ability-icon">${a.icon}</span>
      <span class="ability-text"><strong>${a.label}:</strong> ${a.desc}</span>
    </div>
  `).join('');

  document.getElementById('prof-weakness').innerHTML = dragon.weakness;

  showScreen('screen-profile');
}

function goScenario() {
  const dragon = selectedDragon;
  const scenarios = dragon.scenarios;
  currentScenarioIndex = (currentScenarioIndex + 1) % scenarios.length;
  if (Math.random() < 0.5) currentScenarioIndex = Math.floor(Math.random() * scenarios.length);
  const scenario = scenarios[currentScenarioIndex];
  const outcome = scenario.outcomes[Math.floor(Math.random() * scenario.outcomes.length)];
  const stars = Math.floor(Math.random() * 2) + 4;
  document.getElementById('scenario-text').textContent = '🌩️ ' + scenario.scene;
  document.getElementById('stars-display').textContent = '⭐'.repeat(stars) + (stars < 5 ? '☆'.repeat(5-stars) : '');
  document.getElementById('outcome-text').textContent = outcome;
  showScreen('screen-scenario');
}

function buildGrid() {
  const grid = document.getElementById('dragon-grid');
  grid.innerHTML = dragons.map(d => `
    <div class="dragon-card" onclick="pickDragon(${JSON.stringify(d).replace(/"/g,'&quot;')})">
      <span class="dragon-emoji">${d.dragonEmoji}</span>
      <div class="dragon-name">${d.name}</div>
      <div class="dragon-class">${d.class.split('•')[0].trim()}</div>
      <div class="dragon-tagline">${d.tagline}</div>
    </div>
  `).join('');
  grid.querySelectorAll('.dragon-card').forEach((card, i) => {
    card.onclick = () => pickDragon(dragons[i]);
  });
}

buildGrid();
</script>
